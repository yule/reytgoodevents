title: Reyt Good Events
tagline: "Great Days Out Start Here"
description: >-
  Friendly hobby and gaming events where everyone is welcome. Discover games,
  meet amazing people, explore independent traders and enjoy unforgettable
  days out across Yorkshire.
url: https://yule.github.io
baseurl: /reytgoodevents
keywords: "yorkshire events,hobby events,gaming events,board games,barnsley,geek meet,dungeons and dragons,tabletop gaming,family friendly,reyt good events"

# --- Organiser -----------------------------------------------------------
# Named "organiser", not "host": Jekyll reserves `host` for `jekyll serve
# --host`, and a top-level `host:` key here gets silently overwritten with
# the serve address (e.g. "127.0.0.1") instead of this data.
organiser:
  name: Reyt Good Events
  tagline: Bringing Yorkshire together through great events.
  facebook: https://www.facebook.com/reytgoodevents
  instagram: https://www.instagram.com/reytgoodevents
  phone: "01226 757515"
  email: reytgoodevents@gmail.com

# --- Events ----------------------------------------------------------------
# Every event is one file in _events/ — add a new file there to add a new
# event, no other changes needed. See _events/great-yorkshire-geek-meet.md
# for the fields each event supports.
collections:
  events:
    output: true
    permalink: /events/:path/

# Without this, Jekyll silently skips writing any collection document whose
# `date` front matter is in the future — which is every upcoming event.
future: true

defaults:
  - scope:
      path: ""
      type: events
    values:
      layout: event

# Toggle a dismissible site-wide banner, e.g. for late availability notices.
announcement_enabled: false
announcement_message: ""

exclude:
  - README.md
  - description.txt
  - location.txt
  - Gemfile
  - Gemfile.lock
