title: The Great Yorkshire Geek Meet
tagline: "Roll Dice. Make Friends. Have Fun."
description: >-
  A gaming day for everyone in Barnsley — board games, Dungeons & Dragons,
  Blood on the Clocktower, mini painting and friendly tournaments.
url: https://reytgoodevents.co.uk
keywords: "board games,yorkshire,barnsley,geek meet,dungeons and dragons,blood on the clocktower,tabletop gaming,tournaments,family friendly,reyt good events"

# --- Organiser -----------------------------------------------------------
# Named "organiser", not "host": Jekyll reserves `host` for `jekyll serve
# --host`, and a top-level `host:` key here gets silently overwritten with
# the serve address (e.g. "127.0.0.1") instead of this data.
organiser:
  name: Reyt Good Events
  tagline: Bringing people together through games, fun and community.
  facebook: https://www.facebook.com/reytgoodevents
  instagram: https://www.instagram.com/reytgoodevents

# --- Event details -----------------------------------------------------
# Update these each year rather than hunting through the page HTML.
event:
  name: The Great Yorkshire Geek Meet
  year: 2026
  date_display: "Sunday 4th October 2026"
  time_display: "12:30pm – 9:30pm"
  venue_name: "Griffin Suite, Shaw Lane Cricket Club"
  address_line1: "Shaw Lane"
  address_line2: "Barnsley"
  postcode: "S70 6HZ"
  map_query: "Shaw Lane Cricket Club, Shaw Lane, Barnsley, S70 6HZ"
  price_adult: "£5"
  price_under12: "Free"

# Set this to your ticket/booking link when it goes live.
# While it's blank, the Tickets page shows a "coming soon" notice instead
# of a broken/dead button.
booking_url: ""

# Toggle a dismissible site-wide banner, e.g. for late availability notices.
announcement_enabled: false
announcement_message: ""

exclude:
  - README.md
  - description.txt
  - location.txt
  - Gemfile
  - Gemfile.lock
